version: '3.8'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - D:/Docker/odoo19/pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # optional, only if you want to connect from pgAdmin

  odoo:
    image: odoo:19.0
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - D:/Docker/odoo19/addons:/mnt/extra-addons
      - D:/Docker/odoo19/config:/etc/odoo
      - D:/Docker/odoo19/filestore:/var/lib/odoo